# Runs `nx release` directly on main: bumps versions, writes changelogs,
# commits, tags, pushes commits+tags to origin, and creates GitHub releases.
# Publishing to npm happens in publish.yml, which is triggered by the push
# this workflow makes to main.
#
# This matches the canonical Nx Release flow for independent versioning:
# https://nx.dev/recipes/nx-release/publish-in-ci-cd

name: Release

on:
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4

      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GRAVITY_UI_APP_ID }}
          private-key: ${{ secrets.GRAVITY_UI_APP_PRIVATE_KEY }}

      - name: Run nx release
        run: |
          git config --local user.email "111915794+gravity-ui-bot@users.noreply.github.com"
          git config --local user.name "gravity-ui-bot"

          # Use the App token for pushes so the resulting push to main can
          # trigger publish.yml (the default GITHUB_TOKEN does not trigger
          # downstream workflows).
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # nx.json has git.push=true and git.tag=true, so this single command
          # versions, changelogs, commits, tags, pushes commits+tags, and
          # creates GitHub releases. Publishing to npm is skipped — that runs
          # in publish.yml after this push lands on main.
          pnpm exec nx release --skip-publish --verbose
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
